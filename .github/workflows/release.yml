name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Create Release
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow requests

      - name: Build GameEngine.exe
        run: |
          .\build.ps1

      - name: Create Shippable Release Zip
        shell: powershell
        run: |
          $ReleaseDir = "PokemonChatGame"
          New-Item -ItemType Directory -Path $ReleaseDir
          
          # Create subdirectories
          New-Item -ItemType Directory -Path "$ReleaseDir\GameEngine"
          New-Item -ItemType Directory -Path "$ReleaseDir\Streamerbot"
          
          # Copy files/folders
          Copy-Item "GameEngine\GameEngine.exe" "$ReleaseDir\GameEngine\GameEngine.exe"
          Copy-Item "Overlay" "$ReleaseDir\Overlay" -Recurse
          Copy-Item "image_data" "$ReleaseDir\image_data" -Recurse
          Copy-Item "Streamerbot\import_actions.txt" "$ReleaseDir\Streamerbot\import_actions.txt"
          Copy-Item "image_data\evolution_rules.json" "$ReleaseDir\evolution_rules.json"
          Copy-Item "SETUP.md" "$ReleaseDir\SETUP.md"
          Copy-Item "README.md" "$ReleaseDir\README.md"
          
          # Clean up development python files or artifacts inside image_data
          Remove-Item "$ReleaseDir\image_data\*.py" -ErrorAction SilentlyContinue
          Remove-Item "$ReleaseDir\image_data\__pycache__" -Recurse -ErrorAction SilentlyContinue
          
          # Zip the release directory
          Compress-Archive -Path "$ReleaseDir" -DestinationPath "PokemonChatGame.zip"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: PokemonChatGame.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
