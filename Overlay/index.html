<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pokemon Chat Game Overlay</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="overlay">
      <div class="panel">
        <div class="title">Pokemon Chat Game</div>
        <div id="status" class="status">Waiting for a spawn...</div>
        <div id="spawn" class="spawn hidden">
          <div class="label">Spawned Creature</div>
          <div id="spawn-name" class="spawn-name">Unknown</div>
          <div class="timer">Time left: <span id="timer">0</span>s</div>
        </div>
        <div id="result" class="result hidden"></div>
      </div>
    </div>
    <!-- Floating spawn smoke + spawn GIF shown bottom-right in OBS -->
    <div id="spawn-smoke" class="spawn-smoke hidden"></div>
    <img id="spawn-gif" class="spawn-gif hidden" src="" alt="spawned pokemon" />
    
    <!-- Pokéball container for capture animation -->
    <div id="pokeball-container" class="pokeball-container hidden">
      <div class="pokeball">
        <div class="pokeball-button"></div>
      </div>
    </div>
    <div id="stars-container" class="stars-container"></div>
    
    <!-- Battle animation container -->
    <div id="battle-container" class="battle-container hidden">
      <div class="battle-arena">
        <div class="fighter-wrapper left" id="p1-wrapper">
          <img id="p1-gif" class="fighter-gif" src="" alt="challenger pokemon" />
          <div class="trainer-name" id="p1-trainer">Challenger</div>
        </div>
        <div class="fighter-wrapper right" id="p2-wrapper">
          <img id="p2-gif" class="fighter-gif" src="" alt="accepter pokemon" />
          <div class="trainer-name" id="p2-trainer">Accepter</div>
        </div>
      </div>
      <div id="battle-message-box" class="battle-message-box">
        Battle starting...
      </div>
    </div>
    <!-- Evolution animation container -->
    <div id="evolution-container" class="evolution-container hidden">
      <div class="evolution-arena">
        <img id="evolution-gif" class="evolution-gif" src="" alt="evolving pokemon" />
      </div>
      <div id="evolution-message-box" class="evolution-message-box">
        Something is happening!
      </div>
    </div>
    
    <script src="script.js"></script>
  </body>
</html>
