<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pokemon Chat Game Overlay</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Floating spawn smoke + spawn GIF (bottom-right, always fixed) -->
    <div id="spawn-smoke" class="spawn-smoke hidden"></div>
    <img id="spawn-gif" class="spawn-gif hidden" src="" alt="spawned pokemon" />
    <!-- Pokeball — position:fixed, only shown during catch animation -->
    <img id="pokeball" class="pokeball hidden" src="../data_downloader/pokeball.png" alt="pokeball" aria-hidden="true" />
    <script src="script.js"></script>
  </body>
</html>
