<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pokemon Chat Game Overlay</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="overlay">
      <div class="panel">
        <div class="title">Pokemon Chat Game</div>
        <div id="status" class="status">Waiting for a spawn...</div>
        <div id="spawn" class="spawn hidden">
          <div class="label">Spawned Creature</div>
          <div id="spawn-name" class="spawn-name">Unknown</div>
          <div class="timer">Time left: <span id="timer">0</span>s</div>
        </div>
        <div id="result" class="result hidden"></div>
      </div>
    </div>
    <!-- Floating spawn smoke + spawn GIF shown bottom-right in OBS -->
    <div id="spawn-smoke" class="spawn-smoke hidden"></div>
    <img id="spawn-gif" class="spawn-gif hidden" src="" alt="spawned pokemon" />

    <div id="catch-area" class="catch-area hidden">
      <div id="catch-pokemon-wrapper" class="catch-pokemon-wrapper">
        <div id="catch-pokemon-glow" class="catch-pokemon-glow hidden"></div>
        <img id="catch-pokemon-gif" class="catch-pokemon-gif hidden" src="" alt="catch pokemon" />
      </div>
      <div id="pokeball" class="pokeball hidden" aria-hidden="true">
        <div class="pokeball-top"></div>
        <div class="pokeball-bottom"></div>
        <div class="pokeball-center"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
